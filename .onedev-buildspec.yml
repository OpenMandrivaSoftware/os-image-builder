version: 40
imports:
- projectPath: OpenMandriva/Software
  revision: mirroring
jobs:
- name: Publish Docker image
  jobExecutor: docker-with-mount-cap
  steps:
  - !UseTemplateStep
    name: Build
    templateName: Build
    paramMatrix:
    - name: version
      secret: false
      valuesProvider: !PassthroughValues
        paramName: version
    - name: target
      secret: false
      valuesProvider: !ScriptingValues
        scriptName: docker-arch-to-omv-build-target
    - name: extra-args
      secret: false
      valuesProvider: !SpecifiedValues
        values:
        - - -P core @param:extra-args@
    condition: SUCCESSFUL
    optional: false
  - !CommandStep
    name: Push Docker image
    runInContainer: true
    image: openmandriva/cooker
    interpreter: !DefaultInterpreter
      commands: |
        set -xe

        dnf --assumeyes --no-docs --setopt=install_weak_deps=False --refresh install docker

        systemctl start docker

        docker buildx build \
          --platform linux/@param:docker-arch@ \
          -f helpers/Dockerfile \
          -t @server@/openmandriva/minimal:@param:version@.@param:docker-arch@ \
          --push \
          output

        manifest_args=""
        architectures=("arm64" "amd64")

        for arch in "${architectures[@@]}"; do
          image="@server@/openmandriva/minimal:@param:version@.$arch"
          echo "🔍 Inspecting manifest for: $image"

          manifest_json=$(docker manifest inspect "$image" 2>/dev/null)

          if [ -n "$manifest_json" ]; then
            echo "✅ Manifest found for $arch"
            manifest_args="$manifest_args --amend $image"
          else
            echo "⚠️ No manifest found for $arch"
          fi
        done

        final_image="@server@/openmandriva/minimal:@param:version@"

        if [ -n "$manifest_args" ]; then
          echo "🛠 Creating manifest: $final_image"
          docker manifest create "$final_image" $manifest_args

          echo "📤 Pushing manifest: $final_image"
          docker manifest push "$final_image"
        else
          echo "❌ No architecture-specific images found. Manifest not created."
        fi
    useTTY: true
    condition: SUCCESSFUL
    optional: false
  paramSpecs:
  - !ChoiceParam
    name: version
    allowMultiple: false
    allowEmpty: false
    choiceProvider: !SpecifiedChoices
      choices:
      - value: cooker
        color: '#0d87e9'
      - value: rolling
        color: '#0d87e9'
      - value: rock
        color: '#0d87e9'
    defaultValueProvider: !SpecifiedDefaultValue
      value: cooker
  - !ChoiceParam
    name: docker-arch
    allowMultiple: false
    allowEmpty: false
    choiceProvider: !SpecifiedChoices
      choices:
      - value: amd64
        color: '#0d87e9'
      - value: arm64
        color: '#0d87e9'
  - !TextParam
    name: extra-args
    allowEmpty: true
    multiline: false
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
stepTemplates:
- name: Build
  steps:
  - !CheckoutStep
    name: Checkout repository
    cloneCredential: !DefaultCredential {}
    withLfs: false
    withSubmodules: false
    cloneDepth: 1
    condition: SUCCESSFUL
    optional: false
  - !CommandStep
    name: Run build script in container
    runInContainer: true
    image: openmandriva/cooker
    interpreter: !DefaultInterpreter
      commands: "set -ex\n\necho insecure >> ~/.curlrc\n\ndnf --assumeyes --no-docs --setopt=install_weak_deps=False --refresh upgrade\ndnf --assumeyes --no-docs --setopt=install_weak_deps=False install timezone systemd git\n\n./build @param:extra-args@ -v @param:version@ @param:target@\n\nfolder=$(find . -maxdepth 1 -type d -name \"OpenMandriva-Lx-*\")\nif [ -n \"$folder\" ]; then\n\tmv \"$folder\" \"output\"\nfi\n"
    useTTY: true
    condition: SUCCESSFUL
    optional: false
  paramSpecs:
  - !TextParam
    name: version
    allowEmpty: false
    multiline: false
  - !TextParam
    name: target
    allowEmpty: false
    multiline: false
  - !TextParam
    name: extra-args
    allowEmpty: true
    multiline: false
